
# ─────────────────────────────────────────────────────────────────────────────
# CHD-MedIA 系统配置文件
# 修改后重启后端服务生效
# ─────────────────────────────────────────────────────────────────────────────

database:
  host: "localhost"
  port: 3306
  name: "chd_media"
  user: "root"
  password: "123456"   # 请修改为实际数据库密码
  charset: "utf8mb4"
  pool_size: 10
  max_overflow: 20

app:
  name: "CHD-MedIA 先心病影像检测系统"
  version: "1.0.0"
  debug: false

auth:
  secret_key: "chd-media-jwt-secret-key-change-in-production"  # 生产环境请替换为强随机密钥
  algorithm: "HS256"
  access_token_expire_minutes: 480  # 8 小时

# 系统启动时自动创建的管理员账号（账号不存在时才创建）
admin:
  username: "admin"
  password: "admin123"          # 请在首次登录后修改
  full_name: "系统管理员"

cors:
  origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "http://localhost:3000"

upload:
  dir: "uploads"
  max_size_mb: 200

ai:
  dashscope_api_key: ""         # 建议用环境变量 DASHSCOPE_API_KEY；这里留空可避免密钥进仓库
  dashscope_base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # OpenAI 兼容接口
  dashscope_model: "qwen3-max"  # 例如 qwen3-max / qwen-plus
  dashscope_embedding_model: "text-embedding-v4"  # 可选：做 RAG/相似病例检索时使用
  dashscope_timeout: 60
  dashscope_max_retries: 3

models:
  ultrasound_path: "backend/models/ultrasound_yolo.pt"
  mri_path: "backend/models/best_model_mri.pth"

logging:
  dir: "logs"
  level: "INFO"

# MRI 结构参数正常范围（用于前端异常标记）
# 请按实际临床或训练数据统计值填写，格式示例：
# mri_thresholds:
#   "左心室(LV)":
#     width_mm: [min, max]
#     height_mm: [min, max]
#     area_mm2: [min, max]
mri_thresholds:
  "左心室(LV)":
    width_mm: [35, 55]
    height_mm: [40, 65]
    area_mm2: [1400, 2800]
  "右心室(RV)":
    width_mm: [25, 45]
    height_mm: [30, 60]
    area_mm2: [750, 2000]
  "左心房(LA)":
    width_mm: [25, 40]
    height_mm: [25, 45]
    area_mm2: [625, 1800]
  "右心房(RA)":
    width_mm: [25, 45]
    height_mm: [25, 50]
    area_mm2: [625, 1900]
  "心肌(左室壁/室间隔)":
    width_mm: [6, 11]
    height_mm: [6, 11]
    area_mm2: [36, 121]
  "升主动脉":
    width_mm: [20, 36]
    height_mm: [20, 36]
    area_mm2: [400, 1296]
  "肺动脉(主干)":
    width_mm: [15, 28]
    height_mm: [15, 28]
    area_mm2: [225, 784]
