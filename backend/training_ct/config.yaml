# ImageCHD CT 训练配置
# 用于心脏 CT 分割的 3D U-Net

# ============ 实验配置 ============
experiment:
  name: "imagechd_ct_segmentation"
  description: "ImageCHD 数据集上的心脏 CT 多结构分割"
  seed: 42  # 用于复现结果的随机种子

# ============ 数据集配置 ============
data:
  # 数据目录（必须设置，或通过 --data_dir 提供）
  data_dir: "/path/to/ImageCHD"

  # 自动发现文件的匹配模式
  file_pattern: "*_image.nii.gz"   # 图像文件模式（glob）
  label_pattern: "*_label.nii.gz"  # 标签文件模式（glob）

  # 标签映射：{original_value: class_index}
  # 设为 null 时自动检测
  # 自动检测会扫描前 5 个样本并创建顺序映射
  label_map: null

  # 类别数量（包含背景）
  # 设为 null 时将根据 label_map 自动推断
  num_classes: null

  # 用于可视化和日志记录的类别名称
  # 若未提供，将自动生成
  class_names:
    - "Background"
    - "Left Ventricle"
    - "Right Ventricle"
    - "Left Atrium"
    - "Right Atrium"
    - "Myocardium"
    - "Aorta"
    - "Pulmonary Artery"

  # CT 专用预处理
  ct_preprocessing:
    window_center: 150    # 心脏 CT 窗位中心（HU）
    window_width: 500     # 心脏 CT 窗口宽度（HU）
    clip_range: [-1000, 1000]  # HU 裁剪范围
    resample_spacing: null     # 各向同性可设为 [1.0, 1.0, 1.0]，不重采样则设为 null

  # 三维 patch 配置
  crop_size: [64, 128, 128]  # （D, H, W）- 根据 GPU 显存调整

  # 数据划分配置
  split:
    mode: "ratio"        # 'ratio'、'file' 或 'fold'
    train_ratio: 0.8     # 'ratio' 模式下的训练比例（80% 训练，20% 验证）
    val_ratio: 0.2
    split_file: null     # 'file' 模式下使用（划分 JSON/CSV 路径）
    fold_idx: 0          # 'fold' 模式下使用（哪个折作为验证集）
    num_folds: 5         # 'fold' 模式下使用（总折数）

  # 数据增强
  augmentation:
    enabled: true
    rotation_range: [-10, 10]    # 旋转角度范围（度）
    flip_axes: [0, 1, 2]         # 随机翻转的轴
    scale_range: [0.9, 1.1]      # 缩放因子范围
    gaussian_noise_std: 0.02     # 高斯噪声标准差
    augment_probability: 0.5     # 每种增强应用的概率
    foreground_crop_prob: 0.6    # 裁剪时围绕前景体素采样的概率

  # DataLoader 设置
  num_workers: 4  # 并行数据加载线程数

# ============ 模型配置 ============
model:
  architecture: "UNet3D"
  in_channels: 1           # 灰度 CT
  num_classes: null        # 将从 data.num_classes 中设置
  base_channels: 16        # 16 → 约 5M 参数（12GB GPU）
                          # 32 → 约 20M 参数（24GB GPU）
                          # 8  → 约 1.2M 参数（4GB GPU）
  depth: 4                 # 下采样阶段数（UNet3D 中固定）

  # 权重初始化
  init_weights: true
  pretrained_path: null    # 预训练 checkpoint 路径（可选）

# ============ 训练配置 ============
training:
  epochs: 200
  batch_size: 2  # Adjust based on GPU memory and crop_size

  # 优化器配置
  optimizer:
    type: "Adam"
    lr: 0.001              # 初始学习率
    weight_decay: 0.00001  # L2 正则化
    betas: [0.9, 0.999]    # Adam 的 beta 参数

  # 损失函数配置
  loss:
    type: "CombinedLoss"
    ce_weight: 0.5         # CrossEntropy 权重
    dice_weight: 0.5       # Dice loss 权重
    class_weights: null    # 类别不平衡时使用的权重 [1.0, 1.0, ...]（可选）

  # 学习率调度器
  scheduler:
    type: "ReduceLROnPlateau"
    mode: "max"            # 监控指标（越大越好）
    factor: 0.5            # 学习率衰减因子
    patience: 10           # 降低学习率前等待的 epoch 数
    min_lr: 0.000001       # 最小学习率

  # 混合精度训练（需要 CUDA）
  mixed_precision: true    # 使用 AMP 加速训练

  # 梯度裁剪
  grad_clip_norm: 1.0      # 最大梯度范数（设为 null 关闭）

# ============ 验证配置 ============
validation:
  interval: 1              # 每 N 个 epoch 验证一次
  metric: "dice_fg_mean"   # 用于选择最佳模型的指标
  save_predictions: true   # 验证时保存样本预测结果
  num_samples_to_save: 3   # 需要可视化的验证样本数量

# ============ Checkpoint 配置 ============
checkpoint:
  save_dir: "backend/training_ct/checkpoints"
  save_interval: 20        # 每 N 个 epoch 保存一次 checkpoint
  keep_last_n: 3           # 仅保留最近 N 个 checkpoint（节省磁盘空间）
  save_best: true          # 始终保存基于验证指标的最佳模型

# ============ 日志配置 ============
logging:
  tensorboard: true        # 启用 TensorBoard 日志
  log_interval: 10         # 每 N 个 batch 记录一次

# ============ 硬件配置 ============
hardware:
  device: "cuda"           # 'cuda' 或 'cpu'
  gpu_ids: [0]             # 多 GPU 支持（尚未实现）
  num_threads: 4           # CPU 数据加载线程数
