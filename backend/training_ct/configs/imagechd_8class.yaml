# ImageCHD 8 类分割配置
# 用于多结构心脏 CT 分割

experiment:
  name: "imagechd_ct_8class"
  description: "8-class cardiac structure segmentation"
  seed: 42

data:
  data_dir: "/path/to/ImageCHD"
  file_pattern: "*_image.nii.gz"
  label_pattern: "*_label.nii.gz"

  # 8 类分割（请根据你的 ImageCHD 数据集调整数值）
  # 示例：连续标签（0-7）
  label_map:
    0: 0  # 背景
    1: 1  # 左心室
    2: 2  # 右心室
    3: 3  # 左心房
    4: 4  # 右心房
    5: 5  # 心肌
    6: 6  # 主动脉
    7: 7  # 肺动脉

  num_classes: 8

  class_names:
    - "Background"
    - "Left Ventricle"
    - "Right Ventricle"
    - "Left Atrium"
    - "Right Atrium"
    - "Myocardium"
    - "Aorta"
    - "Pulmonary Artery"

  ct_preprocessing:
    window_center: 150
    window_width: 500
    clip_range: [-1000, 1000]

  crop_size: [64, 128, 128]

  split:
    mode: "ratio"
    train_ratio: 0.8

  augmentation:
    enabled: true

  num_workers: 4

model:
  base_channels: 16  # 约 5M 参数，适合 12GB GPU

training:
  epochs: 200
  batch_size: 2
  optimizer:
    lr: 0.001
    weight_decay: 0.00001
  loss:
    ce_weight: 0.5
    dice_weight: 0.5
  scheduler:
    patience: 10
  mixed_precision: true

checkpoint:
  save_dir: "backend/training_ct/checkpoints"
  save_interval: 20

hardware:
  device: "cuda"
